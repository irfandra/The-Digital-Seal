version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: digital-seal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: digital_seal
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Hardhat Local Blockchain
  hardhat:
    image: node:20-alpine
    container_name: digital-seal-hardhat
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../blockchain:/app
    ports:
      - "8545:8545"
    command: >
      sh -c "
        npm install &&
        npx hardhat node --hostname 0.0.0.0
      "
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8545', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
    driver: local
